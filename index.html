<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smarter Together</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow: hidden;
      background: #0e0c20;
    }

    /* ── Hero link — fixed banner height ─────────────────────── */
    .smt-hero {
      display: flex;
      align-items: center;
      gap: 32px;
      position: relative;
      z-index: 1;
      width: 100%;
      height: 280px;
      padding: 28px 40px;
      text-decoration: none;
      cursor: pointer;
      overflow: hidden;
      border-radius: 12px;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      border: 1px solid rgba(139, 92, 244, 0.30);
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.35);
      transition: border-color 0.35s ease, box-shadow 0.35s ease;
    }

    .smt-hero:hover {
      border-color: rgba(139, 92, 244, 0.50);
      box-shadow: 0 8px 56px rgba(0, 0, 0, 0.45), 0 0 64px rgba(139, 92, 244, 0.1);
    }

    /* Canvas scoped inside the banner — not fixed/full-screen */
    #smt-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* Shine sweep on hover */
    .smt-hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: -120%;
      width: 55%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
      transform: skewX(-18deg);
      transition: left 0.7s ease;
      pointer-events: none;
      z-index: 2;
    }
    .smt-hero:hover::before { left: 160%; }

    .smt-hero:focus-visible {
      outline: 2px solid #8b5cf4;
      outline-offset: -2px;
    }

    /* ── Stat badge ──────────────────────────────────────────── */
    .smt-badge {
      flex-shrink: 0;
      width: 128px;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      z-index: 2;
      background: rgba(12, 9, 32, 0.80);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid rgba(139, 92, 244, 0.30);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.07),
        0 8px 36px rgba(0,0,0,0.5);
      animation: smt-badge-glow 4.5s ease-in-out infinite;
    }

    .smt-badge-header {
      background: linear-gradient(135deg, #5b21b6, #7c3aed, #8b5cf4);
      padding: 11px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .smt-badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.92);
      flex-shrink: 0;
      animation: smt-pulse 2s ease-in-out infinite;
    }

    .smt-badge-label {
      color: rgba(255,255,255,0.92);
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: inherit;
    }

    .smt-badge-body {
      padding: 18px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .smt-badge-number {
      color: #c4b5fd;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
      font-family: inherit;
      text-shadow: 0 0 28px rgba(139,92,244,0.75);
    }

    .smt-badge-unit {
      color: rgba(167,139,250,0.78);
      font-size: 10.5px;
      font-weight: 600;
      font-family: inherit;
    }

    /* ── Content ─────────────────────────────────────────────── */
    .smt-content {
      flex: 1;
      position: relative;
      z-index: 2;
    }

    .smt-eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 10px 0;
      color: rgba(167,139,250,0.90);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      font-family: inherit;
    }

    .smt-eyebrow-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #8b5cf4;
      flex-shrink: 0;
      box-shadow: 0 0 10px rgba(139,92,244,0.85);
      animation: smt-pulse 2.8s ease-in-out infinite;
    }

    /* Gradient heading — fallback to white */
    .smt-title {
      margin: 0 0 8px 0;
      font-size: 32px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.5px;
      font-family: inherit;
      color: #ffffff;
    }
    @supports (-webkit-background-clip: text) or (background-clip: text) {
      .smt-title {
        background: linear-gradient(130deg, #ffffff 0%, #ede9fe 50%, #a78bfa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
    }

    .smt-desc {
      margin: 0 0 16px 0;
      font-size: 15px;
      color: rgba(196,181,253,0.75);
      line-height: 1.60;
      max-width: 460px;
      font-family: inherit;
    }

    /* ── Button ──────────────────────────────────────────────── */
    .smt-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      height: 40px;
      padding: 0 18px;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      background: rgba(9, 6, 28, 0.92);
      transition: transform 0.2s ease;
    }

    /* Blurred gradient glow — brand purple palette */
    .smt-btn-glow {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, #4f46e5, #7c3aed, #a855f7);
      opacity: 0.38;
      filter: blur(10px);
      transition: opacity 0.5s ease;
      pointer-events: none;
    }
    .smt-btn:hover .smt-btn-glow { opacity: 0.82; }

    /* Text + icon row */
    .smt-btn-content {
      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      white-space: nowrap;
    }

    /* Arrow icon */
    .smt-btn-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      stroke: rgba(255,255,255,0.85);
      transition: transform 0.2s ease;
    }
    .smt-btn:hover .smt-btn-icon { transform: translate(2px, -2px); }

    /* Active press */
    .smt-btn:active { transform: scale(0.97); }

    /* ── Keyframes ───────────────────────────────────────────── */
    @keyframes smt-pulse {
      0%, 100% { opacity: 1;   transform: scale(1);    }
      50%       { opacity: 0.3; transform: scale(0.65); }
    }
    @keyframes smt-badge-glow {
      0%, 100% { box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), 0 8px 36px rgba(0,0,0,0.5), 0 0 0px rgba(139,92,244,0);    }
      50%       { box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), 0 8px 36px rgba(0,0,0,0.5), 0 0 24px rgba(139,92,244,0.22); }
    }

    /* ── Reduced motion ──────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .smt-badge, .smt-badge-dot, .smt-eyebrow-dot, .smt-hero::before,
      .smt-btn, .smt-btn-glow, .smt-btn-icon {
        animation: none;
        transition: none;
      }
    }

    /* ── Responsive: tablet stack ────────────────────────────── */
    @media (max-width: 680px) {
      .smt-hero {
        flex-direction: column;
        text-align: center;
        height: auto;
        min-height: 360px;
        padding: 24px 20px;
        gap: 18px;
        align-items: center;
        justify-content: center;
      }
      .smt-eyebrow   { justify-content: center; }
      .smt-badge     { width: 110px; }
      .smt-badge-number { font-size: 24px; }
      .smt-title     { font-size: 22px; }
      .smt-desc      { font-size: 13.5px; max-width: 100%; margin-bottom: 14px; }
      .smt-btn       { height: 36px; padding: 0 16px; }
      .smt-btn-content { font-size: 13px; }
    }
  </style>
</head>
<body>

  <a href="https://app.360learning.com/course/play/68b05a269e3e75842fb5f226"
     target="_blank"
     rel="noopener noreferrer"
     class="smt-hero"
     aria-label="AI Skills Programme — Make AI part of your day-to-day. 30 to 60 minutes saved per week.">

    <!-- Canvas scoped to banner bounds -->
    <canvas id="smt-canvas" aria-hidden="true"></canvas>

    <div class="smt-badge" aria-hidden="true">
      <div class="smt-badge-header">
        <div class="smt-badge-dot"></div>
        <span class="smt-badge-label">TIME SAVED</span>
      </div>
      <div class="smt-badge-body">
        <span class="smt-badge-number">30–60</span>
        <span class="smt-badge-unit">min/week</span>
      </div>
    </div>

    <div class="smt-content">
      <p class="smt-eyebrow">
        <span class="smt-eyebrow-dot" aria-hidden="true"></span>
        AI Skills Programme
      </p>
      <h2 class="smt-title">Make AI part of your day-to-day</h2>
      <p class="smt-desc">Short, practical prompt packs for real tasks — emails, planning, analysis, and summaries — plus safe usage guidance and sense-checking outputs.</p>
      <span class="smt-btn" aria-hidden="true">
        <span class="smt-btn-glow"></span>
        <span class="smt-btn-content">
          Get Started
          <svg class="smt-btn-icon" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M7 17L17 7M17 7H7M17 7v10"/>
          </svg>
        </span>
      </span>
    </div>

  </a>

  <script>
    (function () {
      'use strict';

      const canvas  = document.getElementById('smt-canvas');
      const ctx     = canvas.getContext('2d');
      const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      // ── Config ─────────────────────────────────────────────────
      const CFG = {
        nodeCount:   45,       // reduced: cleaner at compact banner height
        connectDist: 120,
        signalMax:   6,
        spawnRate:   0.024,
        repelDist:   100,
        repelForce:  0.055,
        maxSpeed:    1.0,
        damping:     0.992,
        // Orb radii scaled to fit a ~280px tall banner
        orbs: [
          { rx: 0.12, ry: 0.45, r: 110, c: 'rgba(109,40,217,'  },
          { rx: 0.84, ry: 0.60, r: 95,  c: 'rgba(79,70,229,'   },
          { rx: 0.55, ry: 0.20, r: 75,  c: 'rgba(192,132,252,' },
        ],
      };

      let W, H;
      let nodes   = [];
      let signals = [];
      let mouse   = { x: -9999, y: -9999 };
      const t0    = performance.now();

      // ── Setup — size from the canvas element itself ─────────────
      function resize() {
        W = canvas.width  = canvas.offsetWidth;
        H = canvas.height = canvas.offsetHeight;
      }

      function initNodes() {
        nodes = Array.from({ length: CFG.nodeCount }, () => ({
          x:  Math.random() * W,
          y:  Math.random() * H,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5,
          r:  Math.random() * 1.5 + 1.1,
          a:  Math.random() * 0.32 + 0.14,
        }));
        signals = [];
      }

      // ── Signal: energy pulse along a connection ────────────────
      function spawnSignal() {
        if (signals.length >= CFG.signalMax) return;
        const fi   = Math.floor(Math.random() * nodes.length);
        const from = nodes[fi];
        const pool = [];
        for (let i = 0; i < nodes.length; i++) {
          if (i === fi) continue;
          const d = Math.hypot(nodes[i].x - from.x, nodes[i].y - from.y);
          if (d < CFG.connectDist) pool.push({ i, d });
        }
        if (!pool.length) return;
        pool.sort((a, b) => a.d - b.d);
        const ti = pool[Math.floor(Math.random() * Math.min(4, pool.length))].i;
        signals.push({ fi, ti, t: 0, spd: 0.018 + Math.random() * 0.012 });
      }

      // ── Update physics ─────────────────────────────────────────
      function update() {
        for (const n of nodes) {
          const dx   = n.x - mouse.x;
          const dy   = n.y - mouse.y;
          const dist = Math.hypot(dx, dy);
          if (dist < CFG.repelDist && dist > 0.1) {
            const f = ((CFG.repelDist - dist) / CFG.repelDist) * CFG.repelForce;
            n.vx += (dx / dist) * f;
            n.vy += (dy / dist) * f;
          }

          n.vx *= CFG.damping;
          n.vy *= CFG.damping;
          const spd = Math.hypot(n.vx, n.vy);
          if (spd > CFG.maxSpeed) {
            n.vx = (n.vx / spd) * CFG.maxSpeed;
            n.vy = (n.vy / spd) * CFG.maxSpeed;
          }

          n.x += n.vx;
          n.y += n.vy;
          if (n.x < -10)    n.x = W + 10;
          if (n.x > W + 10) n.x = -10;
          if (n.y < -10)    n.y = H + 10;
          if (n.y > H + 10) n.y = -10;
        }

        for (let i = signals.length - 1; i >= 0; i--) {
          signals[i].t += signals[i].spd;
          if (signals[i].t >= 1) signals.splice(i, 1);
        }

        if (Math.random() < CFG.spawnRate) spawnSignal();
      }

      // ── Draw ───────────────────────────────────────────────────
      function draw(now) {
        const elapsed = (now - t0) * 0.001;
        ctx.clearRect(0, 0, W, H);

        // 1. Ambient orbs — radii now fit within the banner height
        for (const orb of CFG.orbs) {
          const ox = orb.rx * W + Math.sin(elapsed * 0.18 + orb.r) * 22;
          const oy = orb.ry * H + Math.cos(elapsed * 0.13 + orb.r) * 14;
          const g  = ctx.createRadialGradient(ox, oy, 0, ox, oy, orb.r);
          g.addColorStop(0, orb.c + '0.45)');   // lifted from 0.30
          g.addColorStop(1, orb.c + '0)');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(ox, oy, orb.r, 0, Math.PI * 2);
          ctx.fill();
        }

        // 2. Connection lines
        ctx.lineWidth = 0.75;
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const dx = nodes[i].x - nodes[j].x;
            const dy = nodes[i].y - nodes[j].y;
            const d  = Math.sqrt(dx * dx + dy * dy);
            if (d < CFG.connectDist) {
              ctx.strokeStyle = `rgba(139,92,244,${(1 - d / CFG.connectDist) * 0.16})`;
              ctx.beginPath();
              ctx.moveTo(nodes[i].x, nodes[i].y);
              ctx.lineTo(nodes[j].x, nodes[j].y);
              ctx.stroke();
            }
          }
        }

        // 3. Signal pulses
        for (const sig of signals) {
          const from = nodes[sig.fi];
          const to   = nodes[sig.ti];
          const sx   = from.x + (to.x - from.x) * sig.t;
          const sy   = from.y + (to.y - from.y) * sig.t;
          const g    = ctx.createRadialGradient(sx, sy, 0, sx, sy, 5);
          g.addColorStop(0,   'rgba(220,180,255,0.95)');
          g.addColorStop(0.4, 'rgba(139,92,244,0.6)');
          g.addColorStop(1,   'rgba(139,92,244,0)');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(sx, sy, 5, 0, Math.PI * 2);
          ctx.fill();
        }

        // 4. Nodes
        for (const n of nodes) {
          ctx.fillStyle = `rgba(139,92,244,${n.a})`;
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // ── Loop ───────────────────────────────────────────────────
      function loop(now) {
        update();
        draw(now);
        requestAnimationFrame(loop);
      }

      // ── Events ─────────────────────────────────────────────────
      const ro = new ResizeObserver(() => { resize(); initNodes(); });
      ro.observe(canvas.parentElement);

      window.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
      });
      window.addEventListener('touchmove', e => {
        if (e.touches[0]) {
          const rect = canvas.getBoundingClientRect();
          mouse.x = e.touches[0].clientX - rect.left;
          mouse.y = e.touches[0].clientY - rect.top;
        }
      }, { passive: true });
      window.addEventListener('mouseleave', () => {
        mouse.x = -9999;
        mouse.y = -9999;
      });

      // ── Boot ───────────────────────────────────────────────────
      resize();
      initNodes();

      if (reduced) {
        draw(t0);
      } else {
        requestAnimationFrame(loop);
      }
    })();
  </script>

</body>
</html>
